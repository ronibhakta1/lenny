# Alembic Configuration
# NOTE: sqlalchemy.url below is a PLACEHOLDER only.
# The real DB URL is loaded from environment variables in alembic/env.py.
# This file is safe to commit — no real credentials here.

[alembic]
script_location = alembic
prepend_sys_path = .

# Placeholder — overridden by env.py using lenny.configs.DB_URI
sqlalchemy.url = postgresql+psycopg2://user:pass@localhost/dbname

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
